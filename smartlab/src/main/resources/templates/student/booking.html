<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Đặt lịch - SmartLab')}"></head>
<body>
<div th:replace="~{fragments/nav :: mesh}"></div>
<div class="app-shell">
    <header th:replace="~{fragments/nav :: nav}"></header>
    <main class="main-content">

        <div class="page-header">
            <h1>Đặt lịch mentoring</h1>
            <p>Chọn khoa, giảng viên và khung giờ phù hợp</p>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="card">
            <form th:action="@{/student/book}" th:object="${bookingDTO}" method="post">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="departmentId">Khoa / Ngành</label>
                        <select id="departmentId" th:field="*{departmentId}" required>
                            <option value="">-- Chọn khoa --</option>
                            <option th:each="d : ${departments}"
                                    th:value="${d.id}"
                                    th:text="${d.name}"></option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="lecturerId">Giảng viên</label>
                        <select id="lecturerId" th:field="*{lecturerId}" required>
                            <option value="">-- Chọn giảng viên --</option>
                            <option th:each="l : ${lecturers}"
                                    th:value="${l.id}"
                                    th:attr="data-dept=${l.department.id}"
                                    th:text="${l.user.username + ' — ' + l.department.name + (l.specialization != null ? ' (' + l.specialization + ')' : '')}">
                            </option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="sessionDate">Ngày</label>
                        <input type="date" id="sessionDate" th:field="*{sessionDate}"
                               th:attr="min=${minDate}" required>
                    </div>
                    <div class="input-group">
                        <label for="startTime">Giờ bắt đầu</label>
                        <input type="time" id="startTime" th:field="*{startTime}" required>
                    </div>
                    <div class="input-group">
                        <label for="endTime">Giờ kết thúc</label>
                        <input type="time" id="endTime" th:field="*{endTime}" required>
                        <small style="display:block;margin-top:6px;color:var(--text-muted);font-size:0.8rem">
                            Tối thiểu 30 phút / buổi
                        </small>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Đặt lịch</button>
                    <a href="/student/history" class="btn btn-secondary">Xem lịch sử</a>
                </div>
            </form>
        </div>

    </main>
</div>

<script th:inline="javascript">
    (function () {
        const deptSelect = document.getElementById('departmentId');
        const lecturerSelect = document.getElementById('lecturerId');
        if (!deptSelect || !lecturerSelect) return;

        const allOptions = Array.from(lecturerSelect.querySelectorAll('option[data-dept]'));

        function filterLecturers() {
            const deptId = deptSelect.value;
            const current = lecturerSelect.value;

            allOptions.forEach(opt => {
                const match = !deptId || opt.getAttribute('data-dept') === deptId;
                opt.hidden = !match;
                opt.disabled = !match;
            });

            const placeholder = lecturerSelect.querySelector('option[value=""]');
            if (placeholder) placeholder.hidden = false;

            const selected = allOptions.find(o => o.value === current && !o.hidden);
            lecturerSelect.value = selected ? current : '';
        }

        deptSelect.addEventListener('change', filterLecturers);
        filterLecturers();
    })();
</script>
</body>
</html>
