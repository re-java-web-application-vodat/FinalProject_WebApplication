<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Đăng ký - SmartLab')}"></head>
<body class="page-auth">
<div th:replace="~{fragments/nav :: mesh}"></div>

<div class="auth-card">
<div class="auth-logo">S</div>
<h2>Tạo tài khoản</h2>
<p class="auth-subtitle">Đăng ký tài khoản sinh viên SmartLab</p>
<form th:action="@{/register}" th:object="${registerDTO}" method="post">
<div class="input-group"><label>Tên đăng nhập</label><input type="text" th:field="*{username}" required></div>
<div class="input-group"><label>Email</label><input type="email" th:field="*{email}" required></div>
<div class="input-group"><label>Mật khẩu</label><input type="password" th:field="*{password}" minlength="8" required></div>
<button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">Đăng ký</button>
</form>
<p class="auth-footer">Đã có tài khoản? <a href="/login">Đăng nhập</a></p>
</div>

</body>
</html>
