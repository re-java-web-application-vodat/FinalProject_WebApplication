<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Login - SmartLab</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{

            font-family: 'Poppins', sans-serif;

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background:
                    linear-gradient(
                            135deg,
                            #0f172a,
                            #1e293b,
                            #2563eb
                    );

            overflow: hidden;
        }

        .background-circle{

            position: absolute;

            width: 400px;
            height: 400px;

            border-radius: 50%;

            background: rgba(255,255,255,0.08);

            filter: blur(100px);
        }

        .circle-1{
            top: -120px;
            left: -120px;
        }

        .circle-2{
            bottom: -120px;
            right: -120px;
        }

        .login-container{

            position: relative;

            z-index: 2;

            width: 90%;
            max-width: 430px;

            padding: 50px 40px;

            border-radius: 28px;

            background: rgba(255,255,255,0.12);

            backdrop-filter: blur(20px);

            border: 1px solid rgba(255,255,255,0.15);

            box-shadow:
                    0 20px 50px rgba(0,0,0,0.4);

            animation: fadeIn 1s ease;
        }

        .logo{

            width: 80px;
            height: 80px;

            margin: auto auto 25px;

            border-radius: 20px;

            background:
                    linear-gradient(
                            135deg,
                            #3b82f6,
                            #60a5fa
                    );

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;

            font-size: 34px;

            font-weight: bold;

            box-shadow:
                    0 10px 30px rgba(59,130,246,0.5);
        }

        h2{

            color: white;

            text-align: center;

            font-size: 32px;

            margin-bottom: 10px;
        }

        .subtitle{

            text-align: center;

            color: rgba(255,255,255,0.7);

            margin-bottom: 35px;

            font-size: 15px;
        }

        .input-group{

            margin-bottom: 22px;
        }

        .input-group label{

            display: block;

            color: rgba(255,255,255,0.8);

            margin-bottom: 8px;

            font-size: 14px;
        }

        .input-group input{

            width: 100%;

            padding: 15px 18px;

            border: none;

            border-radius: 14px;

            outline: none;

            background: rgba(255,255,255,0.12);

            color: white;

            font-size: 15px;

            border: 1px solid transparent;

            transition: 0.3s;
        }

        .input-group input::placeholder{

            color: rgba(255,255,255,0.55);
        }

        .input-group input:focus{

            border-color: #60a5fa;

            background: rgba(255,255,255,0.18);

            box-shadow:
                    0 0 15px rgba(96,165,250,0.35);
        }

        .login-btn{

            width: 100%;

            padding: 15px;

            border: none;

            border-radius: 14px;

            background:
                    linear-gradient(
                            135deg,
                            #3b82f6,
                            #60a5fa
                    );

            color: white;

            font-size: 16px;

            font-weight: 600;

            cursor: pointer;

            transition: 0.3s;

            margin-top: 10px;

            box-shadow:
                    0 10px 25px rgba(59,130,246,0.35);
        }

        .login-btn:hover{

            transform: translateY(-4px);

            opacity: 0.92;
        }

        .bottom-text{

            margin-top: 25px;

            text-align: center;

            color: rgba(255,255,255,0.7);

            font-size: 14px;
        }

        .bottom-text a{

            color: #93c5fd;

            text-decoration: none;

            font-weight: 600;
        }

        .bottom-text a:hover{

            text-decoration: underline;
        }

        @keyframes fadeIn {

            from{
                opacity: 0;
                transform: translateY(30px);
            }

            to{
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media(max-width:768px){

            .login-container{
                padding: 40px 25px;
            }

            h2{
                font-size: 26px;
            }
        }

    </style>

</head>

<body>

<div class="background-circle circle-1"></div>
<div class="background-circle circle-2"></div>

<div class="login-container">

    <div class="logo">
        S
    </div>

    <h2>Welcome Back</h2>

    <p class="subtitle">
        Login to Smart Academic & Lab Support Platform
    </p>

    <form th:action="@{/login}" method="post">

        <div class="input-group">

            <label>Tên đăng nhập</label>

            <input type="text" name="username" placeholder="Nhập tên đăng nhập">

        </div>

        <div class="input-group">

            <label>Mật khẩu</label>

            <input type="password" name="password" placeholder="Nhập mật khẩu">

        </div>

        <button type="submit" class="login-btn">Đăng nhập</button>

    </form>

    <div class="bottom-text">

        Chưa có tài khoản?

        <a href="/register">
            Đăng kí
        </a>

    </div>

</div>

</body>
</html>
