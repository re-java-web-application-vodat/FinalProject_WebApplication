<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Đăng nhập - SmartLab')}"></head>
<body class="page-auth">
<div th:replace="~{fragments/nav :: mesh}"></div>

<div class="auth-card">
<div class="auth-logo">S</div>
<h2>Chào mừng trở lại</h2>
<p class="auth-subtitle">Đăng nhập Smart Academic &amp; Lab Platform</p>
<div th:if="${param.error}" class="alert alert-error">Sai tên đăng nhập hoặc mật khẩu.</div>
<div th:if="${param.logout}" class="alert alert-success">Đã đăng xuất thành công.</div>
<form th:action="@{/login}" method="post">
<div class="input-group"><label>Tên đăng nhập</label><input type="text" name="username" required></div>
<div class="input-group"><label>Mật khẩu</label><input type="password" name="password" required></div>
<button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">Đăng nhập</button>
</form>
<p class="auth-footer">Chưa có tài khoản? <a href="/register">Đăng ký ngay</a></p>
</div>

</body>
</html>
