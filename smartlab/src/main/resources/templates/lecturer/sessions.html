<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Lịch dạy - SmartLab')}"></head>
<body>
<div th:replace="~{fragments/nav :: mesh}"></div>
<div class="app-shell">
<header th:replace="~{fragments/nav :: nav}"></header>
<main class="main-content">

<div class="page-header"><h1>Lịch mentoring</h1><p>Quản lý buổi hướng dẫn được sinh viên đặt</p></div>
<div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
<div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
<div class="card"><div class="table-wrap"><table>
<thead><tr><th>ID</th><th>Sinh viên</th><th>Ngày</th><th>Giờ</th><th>Khoa</th><th>Trạng thái</th><th>Hành động</th></tr></thead>
<tbody>
<tr th:each="s : ${sessions}">
<td th:text="${s.id}"></td><td th:text="${s.student.username}"></td>
<td th:text="${s.sessionDate}"></td><td th:text="${s.startTime + ' - ' + s.endTime}"></td>
<td th:text="${s.department.name}"></td><td><span class="badge" th:text="${s.status}"></span></td>
<td class="actions">
<a th:if="${s.status.name() == 'CONFIRMED'}" th:href="@{/lecturer/sessions/{id}/evaluate(id=${s.id})}" class="btn btn-primary btn-sm">Đánh giá</a>
<form th:if="${s.status.name() == 'CONFIRMED'}" th:action="@{/lecturer/sessions/{id}/complete(id=${s.id})}" method="post" style="display:inline">
<button type="submit" class="btn btn-success btn-sm">Hoàn thành</button></form>
<form th:if="${s.status.name() == 'PENDING' or s.status.name() == 'PENDING_PAYMENT'}" th:action="@{/lecturer/sessions/{id}/cancel(id=${s.id})}" method="post" style="display:inline">
<button type="submit" class="btn btn-danger btn-sm">Hủy</button></form>
</td></tr>
<tr th:if="${#lists.isEmpty(sessions)}" class="empty-row"><td colspan="7">Chưa có lịch</td></tr>
</tbody></table></div></div>

</main>
</div>
</body>
</html>
